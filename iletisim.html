<main class="container my-5">
    <h2 class="text-center mb-4">İletişim</h2>
    <div class="row justify-content-center">
        <div class="col-md-8">
            <form id="iletisimFormu" action="islem.php" method="POST" class="shadow p-4 rounded bg-light">
                
                <div class="mb-3">
                    <label for="adSoyad" class="form-label">Ad Soyad:</label>
                    <input type="text" class="form-control" id="adSoyad" name="adSoyad">
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">E-posta Adresi:</label>
                    <input type="email" class="form-control" id="email" name="email">
                </div>

                <div class="mb-3">
                    <label for="telefon" class="form-label">Telefon Numarası:</label>
                    <input type="tel" class="form-control" id="telefon" name="telefon">
                </div>

                <div class="mb-3">
                    <label for="konu" class="form-label">Mesaj Konusu:</label>
                    <select class="form-select" id="konu" name="konu">
                        <option value="">Seçiniz...</option>
                        <option value="Destek">Teknik Destek</option>
                        <option value="Oneri">Öneri / İstek</option>
                        <option value="Is">İş Birliği</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label d-block">Cinsiyet:</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="cinsiyet" id="erkek" value="Erkek">
                        <label class="form-check-label" for="erkek">Erkek</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="cinsiyet" id="kadin" value="Kadin">
                        <label class="form-check-label" for="kadin">Kadın</label>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="mesaj" class="form-label">Mesajınız:</label>
                    <textarea class="form-control" id="mesaj" name="mesaj" rows="4"></textarea>
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="kvkk" name="kvkk">
                    <label class="form-check-label" for="kvkk small">KVKK metnini okudum ve onaylıyorum.</label>
                </div>

                <div class="d-grid gap-2 d-md-flex justify-content-md-start mt-4">
                    <button type="button" onclick="validateWithJS()" class="btn btn-primary">JS Denetimi ile Gönder</button>
                    <button type="button" id="vueSubmit" class="btn btn-success">Vue.js Denetimi ile Gönder</button>
                    <button type="reset" class="btn btn-outline-secondary">Formu Temizle</button>
                </div>
            </form>
        </div>
    </div>
</main>


    <!-- Bootstrap JS -->
