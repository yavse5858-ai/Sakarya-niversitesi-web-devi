<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<style>
    .navbar {
        background: rgba(37, 37, 37, 0.95) !important;
        backdrop-filter: blur(10px);
        border-bottom: 2px solid #ffc107;
        padding: 15px 0;
    }
    .navbar-brand {
        font-weight: 800;
        color: #ffc107 !important;
        letter-spacing: 1px;
    }
    .nav-link {
        color: #ffffff !important;
        font-weight: 500;
        margin: 0 10px;
        transition: 0.3s;
    }
    .nav-link:hover {
        color: #ffc107 !important;
        transform: translateY(-2px);
    }
    .nav-link.active {
        color: #ffc107 !important;
        border-bottom: 2px solid #ffc107;
    }
    .login-btn {
        background-color: #ffc107;
        color: #000 !important;
        font-weight: bold;
        border-radius: 20px;
        padding: 8px 25px !important;
    }
    .login-btn:hover {
        background-color: #e0a800;
        box-shadow: 0 0 15px rgba(255, 193, 7, 0.4);
    }
</style>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand" href="index.html">YAVUZ PROJE</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item"><a class="nav-link" href="index.html">Hakkımda</a></li>

                <li class="nav-item"><a class="nav-link" href="mirasimiz.html">Mirasımız</a></li>
                <li class="nav-item"><a class="nav-link" href="ilgi-alanlarim.html">İlgi Alanlarım</a></li>
                <li class="nav-item"><a class="nav-link" href="iletisim.html">İletişim</a></li>
                <li class="nav-item"><a class="nav-link login-btn ms-lg-3" href="login.html">Giriş Yap</a></li>
            </ul>
        </div>
    </div>
</nav>
<main class="container my-5">
    <div class="text-center mb-5">
        <h2 class="fw-bold">İlgi Alanlarım: Sinema Portalı</h2>
        <p class="text-muted">OMDb API altyapısı ile dinamik film sorgulama paneli.</p>
    </div>
    
    <div class="row justify-content-center mb-5">
        <div class="col-md-6">
            <div class="input-group shadow-sm">
                <input type="text" id="filmAraInput" class="form-control" placeholder="Örn: Inception, Interstellar...">
                <button class="btn btn-primary px-4" type="button" onclick="filmAra()">Ara</button>
            </div>
        </div>
    </div>

    <div id="film-listesi" class="row g-4">
        <div class="col-12 text-center text-muted">
            <p>Arama yaparak sonuçları listeleyebilirsiniz.</p>
        </div>
    </div>
</main>
